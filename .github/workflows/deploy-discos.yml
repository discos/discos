name: DISCOS deployment and build

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  deploy-discos:
    name: Deploy DISCOS
    runs-on: ubuntu-latest
    env:
      REPOSITORY_TOKEN: "${{ secrets.DEPENDENCIES_TOKEN }}"
    strategy:
      fail-fast: false
      matrix:
        station: ['SRT', 'Medicina', 'Noto']
    steps:
      - name: Free up space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3'
          check-latest: true
      - name: Clone the deployment repository
        uses: actions/checkout@v6
        with:
          repository: 'discos/deployment'
      - name: Install deployment package and dependencies
        run: |
          python -m pip install -r requirements.txt
          pip install .
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull the latest Docker image
        run: |
          discos-container pull --tag latest
      - name: Create the container
        run: |
          discos-container create
      - name: Set the branch name
        run: |
          if [ "${{ github.event_name }}" == "push" ]; then
            echo "BRANCH_NAME=${{ github.ref_name }}" >> $GITHUB_ENV
          elif [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "BRANCH_NAME=${{ github.head_ref }}" >> $GITHUB_ENV
          fi
      - name: Deploy DISCOS
        run: |
          discos-deploy manager:development --docker --deploy-only -s ${{ matrix.station }} -b ${{ env.BRANCH_NAME }}
      - name: Shutdown the container
        if: always()
        run: |
          discos-container stop || true
